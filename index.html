<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroskAI - Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { background-color: #050810; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }

        #mobileMenuOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 16, 0.98);
            z-index: 100;
            flex-direction: column;
            padding: 2rem;
        }
        #mobileMenuOverlay.active { display: flex; }

        .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        @media (max-width: 768px) { .nav-link.active { border-right: none; border-left: 4px solid #3b82f6; } }

        iframe { width: 100%; height: calc(100vh - 80px); border: none; }

        /* MODAL CHỌN VÍ */
        .wallet-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 8, 16, 0.9);
            justify-content: center;
            align-items: center;
        }
        .wallet-modal.active { display: flex; }
        .wallet-modal-content {
            background-color: #0b1020;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: white;
            text-align: center;
            position: relative;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #64748b;
            transition: color 0.2s;
        }
        .close-modal:hover { color: #fff; }
        .wallet-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .wallet-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #151c33;
            color: white;
            border: 1px solid #222f54;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
            text-align: left;
        }
        .wallet-btn:hover {
            background: #2563eb;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .wallet-btn img { width: 30px; height: 30px; object-fit: contain; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <div id="mobileMenuOverlay">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center italic font-bold">G</div>
                <span class="text-xl font-bold italic tracking-tighter">GroskAI</span>
            </div>
            <button onclick="toggleMobileMenu()" class="text-2xl text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 space-y-2">
            <button onclick="changePage('dashboard', this)" class="nav-link active w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-chart-line w-5"></i> Dashboard
            </button>
            <button onclick="changePage('withdraw', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-exchange-alt w-5"></i> Rút tiền
            </button>
            <button onclick="changePage('whitepaper', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-book-open w-5"></i> White Page
            </button>
            <button onclick="changePage('aichat', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-robot w-5"></i> AI Chat
            </button>
        </nav>

        <div class="mt-auto space-y-6">
            <div id="walletBoxMobile" class="p-4 bg-white/5 rounded-2xl border border-white/10 flex justify-between items-center">
                <span id="mobileWalletAddr" class="text-xs text-slate-400 font-mono">Not Connected</span>
                <i class="fas fa-wallet text-blue-500"></i>
            </div>
            <div class="flex gap-4 justify-center text-xl text-slate-400">
                <i class="fab fa-twitter"></i>
                <i class="fab fa-telegram"></i>
            </div>
        </div>
    </div>

    <aside class="hidden md:flex w-64 bg-[#0a0f1e] border-r border-white/5 p-6 flex-col shrink-0">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-brain text-white"></i></div>
            <h1 class="text-xl font-bold italic">GroskAI</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="changePage('dashboard', this)" class="nav-link active w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-chart-line w-5"></i> Dashboard
            </button>
            <button onclick="changePage('withdraw', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-exchange-alt w-5"></i> Rút tiền
            </button>
            <button onclick="changePage('whitepaper', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-book-open w-5"></i> White Page
            </button>
            <button onclick="changePage('aichat', this)" class="nav-link w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:bg-white/5 transition font-bold text-left">
                <i class="fas fa-robot w-5"></i> AI Chat
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-6 bg-[#050810] shrink-0">
            <div class="flex items-center gap-3 md:hidden">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">G</div>
                <button type="button" onclick="toggleMobileMenu()" title="Toggle mobile menu" class="text-white text-xl ml-2"><i class="fas fa-bars"></i></button>
            </div>

            <h2 id="pageTitle" class="hidden md:block text-sm font-bold text-slate-400 uppercase tracking-widest">Dashboard</h2>
            
            <button id="connectBtn" onclick="handleConnectClick()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-600/20">
                <span id="btnText">Connect Wallet</span>
            </button>
        </header>

        <main class="flex-1">
             <iframe id="mainFrame" src="Dashboard.html" title="Dashboard"></iframe>
         </main>
    </div>

    <div id="walletModal" class="wallet-modal">
        <div class="wallet-modal-content">
            <span class="close-modal" onclick="closeWalletModal()">&times;</span>
            <h3 id="walletModalTitle" class="text-xl font-bold">Kết nối ví của bạn</h3>
            <p id="walletModalDesc" style="color: #94a3b8; font-size: 14px; margin-bottom: 5px;">Chọn ví để bắt đầu giao dịch</p>
            <div class="wallet-options">
                <button class="wallet-btn" onclick="handleWalletSelection('metamask')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask">
                    <span>MetaMask</span>
                </button>
                <button class="wallet-btn" onclick="handleWalletSelection('trustwallet')">
                    <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" alt="Trust Wallet">
                    <span>Trust Wallet</span>
                </button>
                <button class="wallet-btn" onclick="handleWalletSelection('binance')">
                    <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg" alt="Binance Wallet">
                    <span>Binance Wallet</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentAccount = null;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function toggleMobileMenu() {
            document.getElementById('mobileMenuOverlay').classList.toggle('active');
        }

        function changePage(page, btn) {
            const frame = document.getElementById('mainFrame');
            const title = document.getElementById('pageTitle');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if(page === 'whitepaper') {
                frame.src = 'Doc.html';
                title.innerText = 'Whitepaper';
            } else if(page === 'aichat') {
                frame.src = 'Chat.html';
                title.innerText = 'Grosk AI Chat';
            } else if(page === 'withdraw') {
                frame.src = 'Windraw.html';
                title.innerText = 'Rút tiền';
            } else {
                frame.src = 'Dashboard.html';
                title.innerText = 'Dashboard';
            }

            if(document.getElementById('mobileMenuOverlay').classList.contains('active')) {
                toggleMobileMenu();
            }
        }

        // ===================== QUẢN LÝ TÍN HIỆU IFRAME =====================
        function broadcastWalletToIframe(address) {
            const mainFrame = document.getElementById('mainFrame');
            if (mainFrame && mainFrame.contentWindow) {
                mainFrame.contentWindow.postMessage({
                    type: 'WALLET_CONNECTED',
                    address: address
                }, '*');
                console.log("[Web.html] Đã đồng bộ địa chỉ ví sang Iframe:", address);
            }
        }

        // Khi Iframe load xong (lúc mới mở hoặc lúc đổi tab), tự động đẩy lại ví sang
        document.getElementById('mainFrame').addEventListener('load', function() {
            if (currentAccount) {
                broadcastWalletToIframe(currentAccount);
            }
        });

        // ===================== MODAL VÍ =====================
        function openWalletModal() {
            const title = document.getElementById('walletModalTitle');
            const desc = document.getElementById('walletModalDesc');
            if (isMobile && !window.ethereum) {
                title.innerText = 'Mở trong ví';
                desc.innerText = 'Chọn ví để mở trang này trong ứng dụng';
            } else {
                title.innerText = 'Kết nối ví của bạn';
                desc.innerText = 'Chọn ví để bắt đầu giao dịch';
            }
            document.getElementById('walletModal').classList.add('active');
        }

        function closeWalletModal() {
            document.getElementById('walletModal').classList.remove('active');
        }

        function handleConnectClick() {
            if (currentAccount) {
                alert('Ví đã được kết nối: ' + currentAccount);
                return;
            }
            openWalletModal();
        }

        async function handleWalletSelection(walletType) {
            closeWalletModal();
            if (isMobile && !window.ethereum) {
                openInWallet(walletType);
            } else {
                await connectWallet(walletType);
            }
        }

        async function connectWallet(walletType) {
            if (typeof window.ethereum === 'undefined') {
                alert('Không tìm thấy ví điện tử. Vui lòng cài MetaMask hoặc Trust Wallet.');
                return;
            }

            try {
                let selectedProvider = window.ethereum;
                if (window.ethereum.providers) {
                    const providers = window.ethereum.providers;
                    if (walletType === 'metamask') {
                        selectedProvider = providers.find(p => p.isMetaMask) || providers[0];
                    } else if (walletType === 'trustwallet') {
                        selectedProvider = providers.find(p => p.isTrust) || providers[0];
                    } else if (walletType === 'binance') {
                        selectedProvider = providers.find(p => p.isBinance) || providers[0];
                    }
                }

                const accounts = await selectedProvider.request({ method: 'eth_requestAccounts' });
                if (accounts.length > 0) {
                    currentAccount = accounts[0];
                    updateUIAfterConnect(currentAccount);
                    broadcastWalletToIframe(currentAccount);
                }
            } catch (err) {
                console.error(err);
                if (err.code === 4001) {
                    alert('Bạn đã từ chối kết nối ví.');
                } else {
                    alert('Đã xảy ra lỗi khi kết nối ví.');
                }
            }
        }

        function openInWallet(walletType) {
            const currentUrl = window.location.href;
            let deepLink = '';
            switch(walletType) {
                case 'metamask':
                    deepLink = `https://metamask.app.link/dapp/${encodeURIComponent(currentUrl)}`;
                    break;
                case 'trustwallet':
                    deepLink = `https://link.trustwallet.com/open_url?coin_id=60&url=${encodeURIComponent(currentUrl)}`;
                    break;
                case 'binance':
                    deepLink = `https://bsc-wallet.page.link/?link=${encodeURIComponent(currentUrl)}&apn=com.binance.wallet&ibi=com.binance.wallet`;
                    break;
                default:
                    return;
            }
            window.location.href = deepLink;
        }

        function updateUIAfterConnect(address) {
            const shortAddr = address.substring(0, 6) + "..." + address.substring(address.length - 4);
            const btnText = document.getElementById('btnText');
            const connectBtn = document.getElementById('connectBtn');
            btnText.innerText = shortAddr;
            connectBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            connectBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            
            const mobileAddr = document.getElementById('mobileWalletAddr');
            if (mobileAddr) mobileAddr.innerText = shortAddr;
        }

        // Tự động quét ví có sẵn khi tải trang mẹ
        window.addEventListener('load', () => {
            if (window.ethereum && window.ethereum.selectedAddress) {
                currentAccount = window.ethereum.selectedAddress;
                updateUIAfterConnect(currentAccount);
                broadcastWalletToIframe(currentAccount);
            }
        });

        // Lắng nghe thay đổi tài khoản từ Metamask
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', function(accounts) {
                if (accounts.length > 0) {
                    currentAccount = accounts[0];
                    updateUIAfterConnect(currentAccount);
                    broadcastWalletToIframe(currentAccount);
                } else {
                    currentAccount = null;
                    document.getElementById('btnText').innerText = 'Connect Wallet';
                    document.getElementById('connectBtn').classList.add('bg-blue-600', 'hover:bg-blue-700');
                    document.getElementById('connectBtn').classList.remove('bg-green-600', 'hover:bg-green-700');
                    if (document.getElementById('mobileWalletAddr')) 
                        document.getElementById('mobileWalletAddr').innerText = 'Not Connected';
                    broadcastWalletToIframe('');
                }
            });
        }
    </script>
</body>
</html>
